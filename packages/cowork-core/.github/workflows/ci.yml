name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply patches
        run: npx patch-package

      - name: Audit dependencies
        run: npm audit --audit-level=critical --omit=dev || true

      - name: Build native modules for tests
        run: npm rebuild better-sqlite3

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      # Runs tests and enforces coverage thresholds defined in vitest.config.mts.
      # If coverage drops below the thresholds, vitest exits non-zero and this step fails.
      - name: Test with Coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
