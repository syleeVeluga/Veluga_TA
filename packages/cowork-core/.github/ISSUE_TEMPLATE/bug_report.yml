name: Bug Report
description: Report a bug or unexpected behaviour in Open Cowork
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: App Version
      description: Found in the About dialog or window title bar (e.g. 3.3.0-beta.1)
      placeholder: "3.x.x"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "What happened?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal set of steps to reliably reproduce the issue.
      placeholder: |
        1. Open the app
        2. Navigate to ...
        3. Click ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      placeholder: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      placeholder: "What actually happened?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Error Output
      description: Paste any relevant logs from the app's log panel or DevTools console.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, screen recordings, MCP config, or any other relevant information.
